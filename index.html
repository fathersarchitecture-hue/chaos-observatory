<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CHAOS OBSERVATORY</title>
<style>
  :root {
    --bg:#0B0D12; --fg:#E8E6E1; --dim:#5A5F6B; --line:#171A22;
    --green:#7FA33E; --red:#C75B5B;
    --b1:#D9A900; --b2:#4FA3C7; --b3:#C75B5B; --b4:#8A8F98; --b5:#7FA33E;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--fg);
    font-family:'Apple SD Gothic Neo','Noto Sans KR',system-ui,sans-serif; min-height:100vh; }
  .mono { font-family:'SF Mono','IBM Plex Mono',ui-monospace,monospace; }
  .wrap { max-width:560px; margin:0 auto; padding:28px 20px 64px; }
  .eyebrow { font-size:11px; letter-spacing:.25em; color:var(--dim); }
  .round-no { font-size:44px; font-weight:200; letter-spacing:-.02em; line-height:1; margin-top:16px; }
  .draw-date { font-size:12px; color:var(--dim); margin-top:8px; }
  .wt { display:flex; align-items:center; gap:8px; padding:10px 12px;
    border:1px solid var(--line); border-radius:2px; margin-top:22px; }
  .wt-dot { width:6px; height:6px; border-radius:99px; flex-shrink:0; }
  .wt-text { font-size:11.5px; color:var(--dim); }
  .lines { margin-top:30px; }
  .line-row { padding:20px 0; border-bottom:1px solid var(--line); }
  .line-label { font-size:11px; color:var(--dim); width:20px; flex-shrink:0; }
  .line-nums { display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; }
  .line-header { display:flex; align-items:baseline; gap:14px; }
  .num-block { display:inline-flex; flex-direction:column; align-items:center; }
  .num-val { font-size:26px; font-weight:300; }
  .num-bar { width:18px; height:2px; margin-top:4px; }
  .line-meta { font-size:10.5px; color:var(--dim); margin-top:10px; margin-left:34px; }
  .nav { display:flex; gap:22px; margin-top:34px; }
  .nav-btn { background:none; border:none; cursor:pointer; padding:0;
    font-size:12px; letter-spacing:.15em; color:var(--dim); border-bottom:1px solid transparent;
    font-family:'SF Mono','IBM Plex Mono',ui-monospace,monospace; }
  .nav-btn.active { color:var(--fg); border-bottom-color:var(--fg); }
  .plane-wrap { margin-top:24px; }
  .plane-wrap svg { width:100%; border:1px solid var(--line); display:block; }
  .plane-legend { font-size:10.5px; color:var(--dim); margin-top:10px; line-height:1.7; }
  .law { margin-top:24px; font-size:13.5px; line-height:2; color:#9BA0AB; }
  .law-foot { margin-top:18px; font-size:11px; color:#3C414D; }
  .mem { font-size:10.5px; color:var(--dim); margin-top:14px; }
  .foot { margin-top:48px; font-size:10.5px; color:#3C414D;
    border-top:1px solid var(--line); padding-top:14px; }
  .status { font-size:12px; color:var(--dim); margin-top:30px; }
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="eyebrow mono">CHAOS OBSERVATORY</div>
  <div class="status mono">데이터 로딩 중…</div>
</div>
<script>
const ballColor = n => n<=10?'var(--b1)':n<=20?'var(--b2)':n<=30?'var(--b3)':n<=40?'var(--b4)':'var(--b5)';
const TARGET_DATE = "2026.07.11 SAT 20:35";
function watchtower(draws){
  const cnt={}; for(let i=1;i<=45;i++) cnt[i]=0;
  draws.forEach(d=>d.numbers.forEach(n=>cnt[n]++));
  const E=draws.length*6/45;
  const chi2=Object.values(cnt).reduce((a,v)=>a+(v-E)**2/E,0);
  return {chi2:chi2.toFixed(1), fair:chi2<60.48, n:draws.length};
}
function zscore(obj){
  const vals=Object.values(obj);
  const m=vals.reduce((a,b)=>a+b,0)/vals.length;
  const sd=Math.sqrt(vals.reduce((a,b)=>a+(b-m)**2,0)/vals.length)||1;
  const out={}; for(const k in obj) out[k]=(obj[k]-m)/sd; return out;
}
function computeStates(draws){
  const nums=Array.from({length:45},(_,i)=>i+1);
  const wm=draws.slice(-9), wg=draws.slice(-27);
  const mom={}, gap={};
  for(const n of nums){
    mom[n]=wm.reduce((a,d,i)=>a+(d.numbers.includes(n)?i+1:0),0);
    let last=-1; wg.forEach((d,i)=>{if(d.numbers.includes(n)) last=i;});
    gap[n]=last>=0?wg.length-last:wg.length+1;
  }
  const zm=zscore(mom), zg=zscore(gap);
  const sig={}, phase={};
  for(const n of nums){ sig[n]=Math.max(zm[n],zg[n]); phase[n]=zm[n]-zg[n]; }
  return {sig,phase,zm,zg};
}
let currentView='oracle', appData=null;
function renderApp(){
  const {entry,wt}=appData;
  const round=entry.round, lines=entry.lines;
  const banned=new Set(appData.prevEntry?appData.prevEntry.lines.flat():[]);
  const app=document.getElementById('app');
  app.innerHTML=`
    <div class="eyebrow mono">CHAOS OBSERVATORY</div>
    <div class="round-no">제${round}회</div>
    <div class="draw-date mono">${TARGET_DATE}</div>
    <div class="wt">
      <span class="wt-dot" style="background:${wt.fair?'var(--green)':'var(--red)'}"></span>
      <span class="wt-text mono">감시탑 χ²=${wt.chi2} · 임계 60.5 · ${wt.n}회 관측 · ${wt.fair?'공정 가설 유지':'이상 — 체제 전환 검토'}</span>
    </div>
    <div class="lines">
      ${lines.map((c,i)=>{const k=entry.kpis[i];return `
        <div class="line-row">
          <div class="line-header">
            <span class="line-label mono">L${i+1}</span>
            <div class="line-nums">
              ${c.map(n=>`<span class="num-block"><span class="num-val mono">${String(n).padStart(2,'0')}</span><span class="num-bar" style="background:${ballColor(n)}"></span></span>`).join('')}
            </div>
          </div>
          <div class="line-meta mono">합 ${k.sum} · 홀짝 ${k.odd}:${6-k.odd} · 필터탈락 ${k.filterFails} · ${k.nml?'무인지대':'경계'}</div>
        </div>`;}).join('')}
    </div>
    <div class="mem mono">기억 ${appData.ledger.entries.length}주 보관 · 직전 주 ${banned.size}개 번호 추방 중 · 시드 ${round}</div>
    <div class="nav">
      ${[['oracle','오라클'],['plane','관측실'],['law','헌법']].map(([kk,l])=>`<button class="nav-btn mono${currentView===kk?' active':''}" onclick="switchView('${kk}')">${l}</button>`).join('')}
    </div>
    <div id="view-content"></div>
    <div class="foot mono">확률은 변하지 않는다 — 변하는 것은 몫이다</div>`;
  renderView();
}
function renderView(){
  const el=document.getElementById('view-content'); if(!el) return;
  const {states,entry}=appData;
  const chosen=new Set(entry.lines.flat());
  const banned=new Set(appData.prevEntry?appData.prevEntry.lines.flat():[]);
  if(currentView==='plane'){
    const nums=Array.from({length:45},(_,i)=>i+1);
    const dots=nums.map(n=>{
      const x=160+Math.max(-2.6,Math.min(2.6,states.zm[n]))*55;
      const y=160-Math.max(-2.6,Math.min(2.6,states.zg[n]))*55;
      const sel=chosen.has(n), ban=banned.has(n);
      return `<g opacity="${ban?0.18:1}">${sel?`<circle cx="${x}" cy="${y}" r="9" fill="none" stroke="var(--fg)" stroke-width="0.7"/>`:''}<circle cx="${x}" cy="${y}" r="${sel?4:2.6}" fill="${ballColor(n)}"/><text x="${x+7}" y="${y+3}" font-size="7" fill="${sel?'var(--fg)':'var(--dim)'}" font-family="ui-monospace,monospace">${n}</text></g>`;
    }).join('');
    el.innerHTML=`<div class="plane-wrap"><svg viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg"><line x1="160" y1="8" x2="160" y2="312" stroke="var(--line)"/><line x1="8" y1="160" x2="312" y2="160" stroke="var(--line)"/>${dots}<text x="306" y="156" font-size="8" fill="var(--dim)" text-anchor="end" font-family="ui-monospace,monospace">모멘텀 →</text><text x="166" y="16" font-size="8" fill="var(--dim)" font-family="ui-monospace,monospace">↑ 침묵</text></svg><div class="plane-legend mono">x축 9주 모멘텀 · y축 27주 침묵 깊이 · 흰 고리 = 이번 주 성좌 · 흐림 = 추방 중</div></div>`;
  } else if(currentView==='law'){
    el.innerHTML=`<div class="law"><div>제1조 — 적중 결과로부터 학습하지 않는다. 지난주의 일치는 노이즈다.</div><div>제2조 — 공정성은 가정하지 않는다. 매주 검증한다. 감시탑이 울리면 체제를 전환한다.</div><div>제3조 — 확률이 아니라 고독을 최적화한다. 주 3줄, 그 이상은 사지 않는다.</div><div class="law-foot mono">모든 조합의 당첨 확률은 동일하다 (1/8,145,060). 이 엔진이 바꾸는 것은 당첨의 시점이 아니라, 당첨의 자리에 몇 명이 서 있는가이다.</div></div>`;
  } else { el.innerHTML=''; }
}
function switchView(v){
  currentView=v; if(!appData) return;
  document.querySelectorAll('.nav-btn').forEach(b=>{
    b.classList.toggle('active', b.textContent==={oracle:'오라클',plane:'관측실',law:'헌법'}[v]);
  });
  renderView();
}
async function init(){
  try{
    const [lr,dr]=await Promise.all([fetch('./ledger.json'),fetch('./data/draws.json')]);
    if(!lr.ok||!dr.ok) throw new Error('데이터 파일을 불러올 수 없어요');
    const ledger=await lr.json(), db=await dr.json();
    const entries=ledger.entries||[];
    if(!entries.length) throw new Error('원장이 비어 있어요 — 토요일 추첨 후 업데이트됩니다');
    const entry=entries[entries.length-1];
    const prevEntry=entries.length>1?entries[entries.length-2]:null;
    appData={ledger,entry,prevEntry,wt:watchtower(db.draws),states:computeStates(db.draws)};
    renderApp();
  }catch(e){
    document.getElementById('app').innerHTML=`<div class="eyebrow mono">CHAOS OBSERVATORY</div><div class="status mono">${e.message}</div>`;
  }
}
init();
</script>
</body>
</html>
