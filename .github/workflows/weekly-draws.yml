name: weekly-draws

on:
  schedule:
    - cron: "30 12 * * 6"
    - cron: "0 23 * * 6"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Fetch new draws
        run: node scripts/fetch-draws.mjs

      - name: Commit draws if changed
        run: |
          git config user.name "chaos-observatory"
          git config user.email "actions@users.noreply.github.com"
          git add data/draws.json
          if git diff --cached --quiet; then
            echo "no new draws"
          else
            LATEST=$(node -p "JSON.parse(require('fs').readFileSync('data/draws.json','utf8')).latest")
            git commit -m "data: draws through round ${LATEST}"
            git push
          fi

      - name: Generate weekly lines
        run: node scripts/weekly.mjs

      - name: Commit ledger if changed
        run: |
          git add ledger.json
          if git diff --cached --quiet; then
            echo "ledger unchanged"
          else
            ROUND=$(node -p "JSON.parse(require('fs').readFileSync('ledger.json','utf8')).entries.slice(-1)[0].round")
            git commit -m "ledger: round ${ROUND}"
            git push
          fi
